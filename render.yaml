# render.yaml — Render deployment configuration
# Deploys both FastAPI backend and React frontend on Render free tier

services:
  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  - type: web
    name: ats-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_lg
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard
      - key: SECRET_KEY
        sync: false
      - key: EMBEDDING_DEVICE
        value: cpu
      - key: WEIGHT_SEMANTIC
        value: "0.70"
      - key: WEIGHT_SKILL
        value: "0.20"
      - key: WEIGHT_EXPERIENCE
        value: "0.10"
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        sync: false   # set to your Vercel frontend URL

  # ── React Frontend ──────────────────────────────────────────────────────────
  - type: web
    name: ats-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to your Render backend URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html